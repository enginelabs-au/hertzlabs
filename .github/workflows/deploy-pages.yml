# Publishes react-native-app/docs to GitHub Pages at https://enginelabs-au.github.io/hertzlabs/
# Repo settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy legal pages

on:
  push:
    branches: [main]
    paths:
      - 'react-native-app/docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: react-native-app/docs
      - id: deployment
        uses: actions/deploy-pages@v4
