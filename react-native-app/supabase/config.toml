# Supabase project config — generated for Hertz Labs
# Fill in project_id after running: supabase link --project-ref YOUR_REF

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
jwt_expiry = 3600
enable_signup = true

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.validate-promo]
verify_jwt = false

[functions.grant-welcome-premium]
verify_jwt = false

[functions.check-app-version]
verify_jwt = false

[functions.submit-wellness-checkin]
verify_jwt = false
